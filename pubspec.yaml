name: project_uas_xiaomi
description: "Mi Store Clone — Showcase & E-Commerce app built with Flutter & Supabase."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.12.0 <4.0.0'

# =============================================================================
# DEPENDENCIES
# =============================================================================
dependencies:
  flutter:
    sdk: flutter

  # ---------------------------------------------------------------------------
  # Core / Flutter
  # ---------------------------------------------------------------------------
  cupertino_icons: ^1.0.8

  # ---------------------------------------------------------------------------
  # State Management
  # ---------------------------------------------------------------------------
  flutter_bloc: ^9.1.1        # BLoC pattern implementation
  equatable: ^2.0.7            # Value equality untuk BLoC states/events
  bloc: ^9.0.0                 # Core bloc library

  # ---------------------------------------------------------------------------
  # Navigation
  # ---------------------------------------------------------------------------
  go_router: ^15.1.3           # Declarative routing for Flutter

  # ---------------------------------------------------------------------------
  # Backend — Supabase
  # ---------------------------------------------------------------------------
  supabase_flutter: ^2.9.1     # Supabase client (Auth, DB, Storage, Realtime)

  # ---------------------------------------------------------------------------
  # Model / Serialization
  # ---------------------------------------------------------------------------
  freezed_annotation: ^2.4.4   # Annotations untuk Freezed
  json_annotation: ^4.9.0      # Annotations untuk json_serializable

  # ---------------------------------------------------------------------------
  # UI — Components
  # ---------------------------------------------------------------------------
  cached_network_image: ^3.4.1 # Efficient network image caching
  flutter_svg: ^2.0.17         # SVG rendering support
  shimmer: ^3.0.0              # Skeleton loading animation
  carousel_slider: ^5.0.0      # Image/product carousel widget

  # ---------------------------------------------------------------------------
  # UI — Icons & Fonts
  # ---------------------------------------------------------------------------
  flutter_iconly: ^1.0.2       # Modern icon pack (Iconly)
  google_fonts: ^6.2.1         # Poppins via Google CDN (no bundling)

  # ---------------------------------------------------------------------------
  # Utilities
  # ---------------------------------------------------------------------------
  intl: ^0.20.2                # Internationalization & Rupiah currency format
  url_launcher: ^6.3.1         # Launch external URLs / deep links
  shared_preferences: ^2.5.3   # Lightweight local key-value storage
  connectivity_plus: ^6.1.4    # Network connectivity detection
  image_picker: ^1.1.2         # Pick images from gallery / camera
  permission_handler: ^11.4.0  # Runtime permission management
  loading_animation_widget: ^1.3.0 # Premium loading animations

# =============================================================================
# DEV DEPENDENCIES
# =============================================================================
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0        # Recommended Dart/Flutter lint rules

  # ---------------------------------------------------------------------------
  # Code Generation
  # ---------------------------------------------------------------------------
  build_runner: ^2.5.4         # Build system untuk code generation
  freezed: ^2.5.8              # Immutable model & union type generator
  json_serializable: ^6.9.5    # JSON serialization code generator

# =============================================================================
# DEPENDENCY OVERRIDES
# Force versi tertentu untuk mengatasi konflik transitive dependency
# Diperlukan karena Flutter 3.44.1 / Dart 3.12.1 membutuhkan vector_math >= 2.4.0
# =============================================================================
dependency_overrides:
  vector_math: ^2.4.0

# =============================================================================
# FLUTTER CONFIGURATION
# =============================================================================
flutter:
  uses-material-design: true

  assets:
    - assets/images/
